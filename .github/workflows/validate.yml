name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate skill structure and secrets
        run: python .claude/skills/office-skills-review/scripts/validate_skills.py
      - name: Check Python syntax
        run: python -m py_compile office-pdf/scripts/pdf_toolkit.py office-figure/scripts/render-tikz.py office-motion/scripts/motion_toolkit.py
      - name: Check Node syntax
        run: |
          node --check office-ppt/assets/node-starter/create-onij-slide.mjs
          node --check office-figure/assets/node-image-starter/generate-style-image.mjs
